<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6C5CE7"/>
      <stop offset="100%" stop-color="#a29bfe"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Book -->
  <g transform="translate(256, 256)">
    <!-- Book body -->
    <path d="M-140-80 Q-140-120 -100-120 L100-120 Q140-120 140-80 L140 80 Q140 120 100 120 L-100 120 Q-140 120 -140 80 Z" fill="white" opacity="0.95"/>
    <!-- Book spine -->
    <rect x="-8" y="-120" width="16" height="240" rx="2" fill="#6C5CE7"/>
    <!-- Left page lines -->
    <line x1="-100" y1="-60" x2="-20" y2="-60" stroke="#ddd" stroke-width="6" stroke-linecap="round"/>
    <line x1="-100" y1="-20" x2="-20" y2="-20" stroke="#ddd" stroke-width="6" stroke-linecap="round"/>
    <line x1="-100" y1="20" x2="-20" y2="20" stroke="#ddd" stroke-width="6" stroke-linecap="round"/>
    <line x1="-100" y1="60" x2="-20" y2="60" stroke="#ddd" stroke-width="6" stroke-linecap="round"/>
    <!-- Right page lines -->
    <line x1="20" y1="-60" x2="100" y2="-60" stroke="#eee" stroke-width="6" stroke-linecap="round"/>
    <line x1="20" y1="-20" x2="100" y2="-20" stroke="#eee" stroke-width="6" stroke-linecap="round"/>
    <line x1="20" y1="20" x2="100" y2="20" stroke="#eee" stroke-width="6" stroke-linecap="round"/>
    <!-- Letter E on left page -->
    <text x="-82" y="-32" font-family="sans-serif" font-size="26" font-weight="bold" fill="#6C5CE7">E</text>
    <!-- Letter N on right page -->
    <text x="30" y="-32" font-family="sans-serif" font-size="26" font-weight="bold" fill="#a29bfe">N</text>
    <!-- Bookmark -->
    <path d="M-10-120 L-10-150 L0-138 L10-150 L10-120" fill="#FF6B6B"/>
  </g>
</svg>
